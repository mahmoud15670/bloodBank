<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d9534f" />
    <meta
      name="description"
      content="تطبيق بنك الدم لإدارة رصيد الدم وإرسال إشعارات عند تحديث الرصيد."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/style.css" />
    <title>بنك الدم</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>
    <script src="/main.js"></script>
  </head>
  <body>
    <div id="main-container" class="container">
      <h1>بنك دم مستشفى برج العرب</h1>
      <div class="clock-display" id="live-clock">الوقت الحالي: 00:00:00</div>

      <div class="cards-container">
        <div class="card">
          <h3>كرات الدم (RBCs)</h3>
          <div class="inputs-grid">
            <div class="input-group">
              <label>+A</label
              ><input type="number" id="rbc_ap" value="5" min="0" />
            </div>
            <div class="input-group">
              <label>-A</label
              ><input type="number" id="rbc_am" value="2" min="0" />
            </div>
            <div class="input-group">
              <label>+B</label
              ><input type="number" id="rbc_bp" value="1" min="0" />
            </div>
            <div class="input-group">
              <label>-B</label
              ><input type="number" id="rbc_bm" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>+AB</label
              ><input type="number" id="rbc_abp" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-AB</label
              ><input type="number" id="rbc_abm" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>+O</label
              ><input type="number" id="rbc_op" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-O</label
              ><input type="number" id="rbc_om" value="0" min="0" />
            </div>
          </div>
        </div>

        <div class="card">
          <h3>البلازما (Plasma)</h3>
          <div class="inputs-grid">
            <div class="input-group">
              <label>A</label
              ><input type="number" id="plasma_ap" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>B</label
              ><input type="number" id="plasma_bp" value="2" min="0" />
            </div>
            <div class="input-group">
              <label>AB</label
              ><input type="number" id="plasma_abp" value="3" min="0" />
            </div>
            <div class="input-group">
              <label>O</label
              ><input type="number" id="plasma_op" value="0" min="0" />
            </div>
          </div>
        </div>

        <div class="card">
          <h3>الصفائح (Platelets)</h3>
          <div class="inputs-grid">
            <div class="input-group">
              <label>+A</label
              ><input type="number" id="plat_ap" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-A</label
              ><input type="number" id="plat_am" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>+B</label
              ><input type="number" id="plat_bp" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-B</label
              ><input type="number" id="plat_bm" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>+AB</label
              ><input type="number" id="plat_abp" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-AB</label
              ><input type="number" id="plat_abm" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>+O</label
              ><input type="number" id="plat_op" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-O</label
              ><input type="number" id="plat_om" value="0" min="0" />
            </div>
          </div>
        </div>
        <div class="card">
          <h3>الأجزاء (Parts)</h3>
          <div class="inputs-grid">
            <div class="input-group">
              <label>A+</label>
              <input type="number" id="part_ap" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-A</label
              ><input type="number" id="part_am" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>+B</label
              ><input type="number" id="part_bp" value="1" min="0" />
            </div>
            <div class="input-group">
              <label>-B</label
              ><input type="number" id="part_bm" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>+AB</label
              ><input type="number" id="part_abp" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-AB</label
              ><input type="number" id="part_abm" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>+O</label
              ><input type="number" id="part_op" value="0" min="0" />
            </div>
            <div class="input-group">
              <label>-O</label
              ><input type="number" id="part_om" value="0" min="0" />
            </div>
          </div>
        </div>
      </div>

      <button class="btn-action" onclick="saveData()">حفظ التعديلات</button>
      <button class="btn-action btn-secondary" onclick="showSimplifiedView()">
        التقاط صورة للجدول
      </button>
      <div id="notification" class="notification">تم حفظ البيانات بنجاح!</div>
    </div>

    <div id="result-container" class="container hidden">
      <div id="capture-area">
        <h2 style="text-align: center; color: var(--primary-color)">
          رصيد بنك الدم المتاح
        </h2>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>المكون</th>
                <th>الفصيلة</th>
                <th>العدد</th>
              </tr>
            </thead>
            <tbody id="simplified-table-body"></tbody>
          </table>
        </div>
      </div>

      <button class="btn-action btn-success" onclick="captureImage()">
        📸 حفظ الصورة (تحميل فى الهاتف)
      </button>
      <button class="btn-action btn-whatsapp" onclick="shareViaWhatsApp()">
        <span><i class="fa-brands fa-whatsapp"></i> </span>
        إرسال إلى الواتساب
      </button>
      <button class="btn-action btn-secondary" onclick="goBack()">
        🔙 العودة للتعديل
      </button>
    </div>

    <footer>
      copyright &copy; 2026
      <a href="https://mahmoud-ghallab.netlify.app/">Mahmoud Ghallab</a> All
      rights reserved.
    </footer>
  </body>
</html>
